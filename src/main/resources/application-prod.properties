# ????????????????????????????????????????????????????????????????????
# TRI-SERVICE PROFILER ? PROD PROFILE
# Activated by: SPRING_PROFILES_ACTIVE=prod  (set as an environment
# variable on your server, Docker container, or Kubernetes pod)
#
# CRITICAL RULES FOR THIS FILE:
#   1. No hardcoded secrets ? every sensitive value uses ${ENV_VAR}
#   2. No SQL logging ? performance and security risk
#   3. No stack traces in responses ? information leakage risk
#   4. DDL is validate-only ? schema changes go through migrations
#   5. This file is committed to git ? treat it as fully public
#
# Required environment variables on your production server:
#   DB_URL             jdbc:postgresql://your-host:5432/tri_service_prod
#   DB_USERNAME        your database username
#   DB_PASSWORD        your database password
#   REDIS_HOST         your Redis host
#   REDIS_PORT         your Redis port (usually 6379)
#   REDIS_PASSWORD     your Redis auth password
#   JWT_SECRET         random 256-bit string ? openssl rand -base64 32
#   GITHUB_CLIENT_ID   from your GitHub OAuth App (prod app, not dev)
#   GITHUB_CLIENT_SECRET  from your GitHub OAuth App
#   APP_BASE_URL       https://your-domain.com
# ????????????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????????????
# SERVER
# ????????????????????????????????????????????????????????????????????

server.port=8080

# Never expose internal details to clients in production
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ????????????????????????????????????????????????????????????????????
# DATABASE ? PRODUCTION POSTGRESQL
# All values from environment variables ? never hardcoded here.
# ????????????????????????????????????????????????????????????????????

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Production pool sized for real concurrent traffic
spring.datasource.hikari.pool-name=TriServiceProdPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Prevents idle connections being killed by the database server
spring.datasource.hikari.keepalive-time=60000

# ????????????????????????????????????????????????????????????????????
# JPA / HIBERNATE ? PROD
# validate: Hibernate checks entities match the schema on startup.
# If they do not match the app refuses to start ? safe, intentional.
# Never use update or create in production.
# ????????????????????????????????????????????????????????????????????

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Batch inserts for the seeder and any bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ????????????????????????????????????????????????????????????????????
# REDIS ? PRODUCTION
# Host, port, and password all from environment variables.
# If your Redis provider requires SSL (Upstash, Azure, etc.)
# uncomment the ssl line below.
# ????????????????????????????????????????????????????????????????????

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Uncomment for providers that require TLS (Upstash, Azure Cache)
# spring.data.redis.ssl.enabled=true

# Larger pool for production load
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=4
spring.data.redis.lettuce.pool.max-wait=1000ms

# ????????????????????????????????????????????????????????????????????
# RATE LIMITING ? STRICT PRODUCTION VALUES
# Matches your base application.properties exactly.
# Declared explicitly here so it is obvious these are intentional
# production settings and not accidentally inherited dev overrides.
# Your Bucket4jConfig reads duration.minutes ? keeping that format.
# ????????????????????????????????????????????????????????????????????

rate.limit.auth.requests=10
rate.limit.auth.duration.minutes=1

rate.limit.api.requests=60
rate.limit.api.duration.minutes=1

# ????????????????????????????????????????????????????????????????????
# DATA SEEDER
# Never auto-seed in production.
# Initial data load is a one-time manual operation or a Flyway script.
# ????????????????????????????????????????????????????????????????????

seeder.enabled=false
seeder.csv.path=classpath:data/profiles_2026.csv

# ????????????????????????????????????????????????????????????????????
# JACKSON
# ????????????????????????????????????????????????????????????????????

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ????????????????????????????????????????????????????????????????????
# LOGGING ? MINIMAL
# Only WARN and above from frameworks.
# Your own code (com.insighta) stays at INFO so request logs appear.
# JSON format makes logs parseable by Datadog, Grafana, CloudWatch.
# ????????????????????????????????????????????????????????????????????

logging.level.root=WARN
logging.level.com.insighta=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.io.github.bucket4j=WARN

# Structured JSON ? one log entry per line, easy for aggregators to parse
logging.pattern.console={"time":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}","level":"%-5level","app":"tri-service-profiler","thread":"%t","logger":"%logger{36}","msg":"%message"}%n

# ????????????????????????????????????????????????????????????????????
# ACTUATOR ? LOCKED DOWN
# Only /actuator/health exposed on the public port.
# If you have an internal network, uncomment management.server.port
# and expose more endpoints on that port only.
# ????????????????????????????????????????????????????????????????????

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# Uncomment to expose actuator on a separate internal-only port
# management.server.port=8081

# ????????????????????????????????????????????????????????????????????
# GITHUB OAUTH ? PRODUCTION
# Register a SEPARATE GitHub OAuth App for prod:
#   https://github.com/settings/developers
#   Homepage URL:  https://your-domain.com
#   Callback URL:  https://your-domain.com/auth/web/callback
# ????????????????????????????????????????????????????????????????????

github.oauth.client-id=${GITHUB_CLIENT_ID}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET}
github.oauth.callback.web=${APP_BASE_URL}/auth/web/callback
github.oauth.callback.cli=http://localhost:8765/callback
github.oauth.scope=read:user,user:email

# ????????????????????????????????????????????????????????????????????
# JWT
# Generate a strong secret: openssl rand -base64 32
# Never reuse your dev secret here.
# ????????????????????????????????????????????????????????????????????

jwt.secret=${JWT_SECRET}
jwt.access.token.expiry.seconds=900
jwt.refresh.token.expiry.seconds=604800

# ????????????????????????????????????????????????????????????????????
# COOKIE SECURITY
# ????????????????????????????????????????????????????????????????????

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict