server.port=8080
server.error.include-stacktrace=never

# PostgreSQL Configuration (Using Railway Environment Variables)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver


# JPA - Validate only (No auto-schema changes in prod)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Redis - Environment Variables Required
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# Strict Rate Limits
rate.limit.auth.requests=10
rate.limit.api.requests=60

# Data Seeder - Always OFF in prod
seeder.enabled=false

# JWT Production Security
com.mouse.jwt.secret=${JWT_SECRET}
com.mouse.jwt.access-token-ttl=PT15M
com.mouse.jwt.refresh-token-ttl=P7D

# Cookie Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Minimal JSON Logging for aggregators
logging.pattern.console={"time":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}","level":"%-5level","msg":"%message"}%n