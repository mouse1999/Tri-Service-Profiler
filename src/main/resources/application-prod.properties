server.port=8080
server.error.include-stacktrace=never

# ============================================
# PostgreSQL Configuration (Railway)
# ============================================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ============================================
# JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ============================================
# Rate Limiting
# ============================================
rate.limit.auth.requests=10
rate.limit.api.requests=60
rate.limiting.enabled=true

# ============================================
# Data Seeder (ALWAYS OFF in prod)
# ============================================
seeder.enabled=true

# ============================================
# JWT Configuration
# ============================================
insighta.jwt.secret=${JWT_SECRET}
insighta.jwt.access-token-ttl=PT15M
insighta.jwt.refresh-token-ttl=P7D

# ============================================
# Cookie Security (HTTPS only)
# ============================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=7d

# ============================================
# CORS (Adjust for your frontend URL)
# ============================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://your-frontend.com}
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# ============================================
# Logging (JSON format for aggregators)
# ============================================
logging.pattern.console={"time":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}","level":"%-5level","logger":"%logger","msg":"%message"}%n
logging.level.com.mouse.profiler=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ============================================
# Actuator (Health checks for Railway)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ==========================================
# GitHub OAuth (Use environment variables)
# ============================================
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}
github.redirect.uri=${GITHUB_REDIRECT_URI}

frontend.redirect.uri=${FRONTEND_REDIRECT_URI}