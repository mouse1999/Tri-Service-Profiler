# ????????????????????????????????????????????????????????????????????
# TRI-SERVICE PROFILER ? DEV PROFILE
# Activated by: spring.profiles.active=dev in application.properties
#
# Goals:
#   - Verbose logging so you see exactly what every filter does
#   - Relaxed rate limits so you do not block yourself during manual testing
#   - Local PostgreSQL and Redis on default ports
#   - Hibernate auto-updates schema so you never manually run DDL
#   - Full error details in responses
# ????????????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????????????
# SERVER
# ????????????????????????????????????????????????????????????????????

server.port=8080

# Show full stack traces in error responses during development
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# ????????????????????????????????????????????????????????????????????
# DATABASE ? LOCAL POSTGRESQL
# Start with:
#   docker run -p 5432:5432 \
#     -e POSTGRES_DB=tri_service_dev \
#     -e POSTGRES_USER=tri_service \
#     -e POSTGRES_PASSWORD=tri_service \
#     postgres:16-alpine
# ????????????????????????????????????????????????????????????????????

spring.datasource.url=jdbc:postgresql://localhost:5432/tri_service_dev
spring.datasource.username=tri_service
spring.datasource.password=tri_service
spring.datasource.driver-class-name=org.postgresql.Driver

# Small pool for local development ? no need for more than 5 connections
spring.datasource.hikari.pool-name=TriServiceDevPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ????????????????????????????????????????????????????????????????????
# JPA / HIBERNATE
# update: Hibernate modifies existing tables to match your entities.
# Safe for dev. Never use in prod.
# ????????????????????????????????????????????????????????????????????

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ????????????????????????????????????????????????????????????????????
# REDIS ? LOCAL
# Inherits host=localhost, port=6379, database=0 from base.
# Only overrides timeout for a faster failure response locally.
# Start with:
#   docker run -p 6379:6379 redis:7.2-alpine
# ????????????????????????????????????????????????????????????????????

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5s

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# ????????????????????????????????????????????????????????????????????
# RATE LIMITING ? RELAXED FOR DEV
# 10x the normal limits so you do not block yourself while testing
# endpoints manually in Postman or a browser.
# Your Bucket4jConfig reads rate.limit.auth.duration.minutes and
# rate.limit.api.duration.minutes ? keeping minutes here to match.
# ????????????????????????????????????????????????????????????????????

rate.limit.auth.requests=100
rate.limit.auth.duration.minutes=1

rate.limit.api.requests=600
rate.limit.api.duration.minutes=1

# ????????????????????????????????????????????????????????????????????
# DATA SEEDER
# Runs on startup and loads the 2026 profiles CSV into the database.
# Set to false once data is loaded to avoid re-seeding on every restart.
# ????????????????????????????????????????????????????????????????????

seeder.enabled=true
seeder.csv.path=classpath:data/profiles_2026.csv

# ????????????????????????????????????????????????????????????????????
# JACKSON
# ????????????????????????????????????????????????????????????????????

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ????????????????????????????????????????????????????????????????????
# LOGGING ? VERBOSE
# com.insighta at DEBUG means you see every log line from your own
# filters, interceptors, and services.
# Hibernate SQL at DEBUG means every query is printed.
# ????????????????????????????????????????????????????????????????????

logging.level.root=INFO
logging.level.com.insighta=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.io.github.bucket4j=DEBUG

# Human-readable console pattern with colour
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(---){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

# ????????????????????????????????????????????????????????????????????
# ACTUATOR ? FULLY OPEN IN DEV
# All endpoints exposed so you can inspect beans, env, metrics, health.
# ????????????????????????????????????????????????????????????????????

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always