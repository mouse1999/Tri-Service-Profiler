server.port=8080
server.error.include-stacktrace=always


spring.datasource.url=jdbc:h2:mem:tri_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data Seeder (Loads your 2026 profiles)
seeder.enabled=true
seeder.csv.path=classpath:data/profiles_2026.csv

# Logging - Targeted at your package structure
logging.level.root=INFO
logging.level.com.mouse=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Relaxed Rate Limits for Testing
rate.limit.auth.requests=100
rate.limit.api.requests=600

# Disable rate limiting for tests
rate.limiting.enabled=false

# Disable Redis auto-configuration for tests
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# GitHub OAuth test properties (mock values)
# Mock external API calls in tests
github.client-id=mock_client_id
github.client-secret=mock_client_secret
spring.main.allow-bean-definition-overriding=true

# Disable any external API calls
external.api.mock.enabled=true
github.redirect-uri=http://localhost:8080/auth/github/callback

# JWT test secret
insighta.jwt.secret=test-secret-key-for-unit-tests-only-32-chars
insighta.jwt.access-token-ttl=PT3M
insighta.jwt.refresh-token-ttl=PT5M

management.endpoints.web.exposure.include=*