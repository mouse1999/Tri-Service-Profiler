# ==========================
# SERVER CONFIGURATION
# ==========================
server.port=8080
server.servlet.context-path=

# ==========================
# DATABASE CONFIGURATION (H2 In-Memory)
# ==========================
# Using an in-memory DB is faster for dev; data resets on every restart.
spring.datasource.url=jdbc:h2:mem:profilerdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable the H2 Web Console so you can view your tables at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================
# JPA / HIBERNATE CONFIGURATION
# ==========================
# 'update' will create tables based on your @Entity classes automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Show SQL in the console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
# Set to 'trace' if you need to see the values bound to '?' in SQL queries
logging.level.org.hibernate.orm.jdbc.bind=trace

# ==========================
# LOGGING CONFIGURATION
# ==========================
logging.level.root=INFO
logging.level.com.mouse.profiler=DEBUG
# Useful for seeing how Spring maps your QueryCriteria
logging.level.org.springframework.web=DEBUG

# ==========================
# JACKSON (JSON) CONFIGURATION
# ==========================
# Ensure dates are formatted nicely in your DTOs
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==========================
# FILE UPLOAD (If needed for profiles)
# ==========================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB