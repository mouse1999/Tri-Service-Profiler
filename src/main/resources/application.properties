# ????????????????????????????????????????????????????????????????????
# TRI-SERVICE PROFILER ? BASE CONFIGURATION
# Shared across all profiles. Each profile overrides what it needs.
# ????????????????????????????????????????????????????????????????????

spring.application.name=Tri-Service-Profiler
spring.profiles.active=test

# ????????????????????????????????????????????????????????????????????
# REDIS ? BASE DEFAULTS
# Dev and test override these. Prod replaces all with env vars.
# ????????????????????????????????????????????????????????????????????

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=50s

# ????????????????????????????????????????????????????????????????????
# RATE LIMITING ? BASE DEFAULTS
# These match your existing values exactly.
# duration.minutes is what your Bucket4jConfig @Value reads.
# ????????????????????????????????????????????????????????????????????

rate.limit.auth.requests=10
rate.limit.auth.duration.minutes=1

rate.limit.api.requests=60
rate.limit.api.duration.minutes=1

# JWT Configuration
insighta.jwt.secret=${JWT_SECRET:your-256-bit-secret-here}
insighta.jwt.access-token-ttl=PT3M
insighta.jwt.refresh-token-ttl=PT5M

# GitHub OAuth Configuration
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://localhost:8080/auth/github/callback}

# Frontend Configuration
frontend.redirect.uri=${FRONTEND_REDIRECT_URI:http://localhost:3000/auth/callback}