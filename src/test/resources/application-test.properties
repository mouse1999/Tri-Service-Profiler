# ????????????????????????????????????????????????????????????????????
# TRI-SERVICE PROFILER ? TEST PROFILE
# Activated by: @ActiveProfiles("test") on BaseIntegrationTest
#
# IMPORTANT ? REDIS HOST AND PORT ARE NOT SET HERE.
# BaseIntegrationTest uses @DynamicPropertySource to inject:
#   spring.data.redis.host ? from the running Testcontainers container
#   spring.data.redis.port ? random port assigned by Docker
# Setting them here would be overridden anyway and cause confusion.
#
# IMPORTANT ? RATE LIMIT DURATION.
# Your Bucket4jConfig reads rate.limit.auth.duration.minutes and
# rate.limit.api.duration.minutes. The test profile keeps the same
# property names but sets them to 0 minutes and uses a new
# rate.limit.*.duration.seconds property for the 5-second window.
# You will need to update Bucket4jConfig to prefer seconds when
# minutes is 0 ? see the note below the file.
# ????????????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????????????
# SERVER
# Port 0 tells Spring to pick any available random port.
# TestRestTemplate is automatically configured to use that port.
# ????????????????????????????????????????????????????????????????????

server.port=0

# Full error details in test output ? helps diagnose unexpected failures
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# ????????????????????????????????????????????????????????????????????
# DATABASE ? H2 IN-MEMORY
# No Docker, no external dependency, starts in milliseconds.
# MODE=PostgreSQL makes H2 behave like PostgreSQL for JPA queries
# so your entities work the same as in dev and prod.
# DB_CLOSE_DELAY=-1 keeps the DB alive for the full test run.
# ????????????????????????????????????????????????????????????????????

spring.datasource.url=jdbc:h2:mem:tri_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true

# ????????????????????????????????????????????????????????????????????
# JPA / HIBERNATE ? TEST
# create-drop: schema is created fresh when the context starts and
# dropped when the context closes. Every test run starts clean.
# ????????????????????????????????????????????????????????????????????

spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ????????????????????????????????????????????????????????????????????
# REDIS
# DO NOT set host or port here.
# @DynamicPropertySource in BaseIntegrationTest handles these.
#
# Other Redis settings are safe to configure here.
# ????????????????????????????????????????????????????????????????????

# Redis
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5s

# Small pool ? test suite runs one request at a time sequentially
spring.data.redis.lettuce.pool.max-active=4
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=500ms

# ????????????????????????????????????????????????????????????????????
# RATE LIMITING ? COMPRESSED TO 5 SECONDS
#
# Problem: your base config uses 1-minute windows. Tests cannot wait
# 60 seconds between test methods for buckets to refill naturally.
# BaseIntegrationTest.flushRedis() handles reset between tests, but
# within a single test the window still matters.
#
# Solution: compress the window to 5 seconds. The COUNT stays the
# same (10 auth, 60 api) so all assertions about WHEN a 429 happens
# remain valid. Only the time dimension shrinks.
#
# These keep the same property name format your Bucket4jConfig uses:
#   rate.limit.auth.duration.minutes
#   rate.limit.api.duration.minutes
#
# Setting minutes=0 and adding a seconds override.
# See the Bucket4jConfig note below for how to handle this.
# ????????????????????????????????????????????????????????????????????

rate.limit.auth.requests=10
rate.limit.auth.duration.minutes=0
rate.limit.auth.duration.seconds=5

rate.limit.api.requests=60
rate.limit.api.duration.minutes=0
rate.limit.api.duration.seconds=5

# ????????????????????????????????????????????????????????????????????
# DATA SEEDER
# Always disabled in tests. Test data is set up by each test class.
# Running the seeder would pollute H2 with CSV data that breaks
# assertions about specific row counts or profile names.
# ????????????????????????????????????????????????????????????????????

seeder.enabled=false

# ????????????????????????????????????????????????????????????????????
# JACKSON
# ????????????????????????????????????????????????????????????????????

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ????????????????????????????????????????????????????????????????????
# GITHUB OAUTH ? PLACEHOLDERS
# OAuth is not tested in integration tests ? tested separately with
# mocked HTTP clients. These placeholders stop Spring from failing
# to start when the OAuth configuration bean reads these values.
# ????????????????????????????????????????????????????????????????????

github.oauth.client-id=test-client-id
github.oauth.client-secret=test-client-secret
github.oauth.callback.web=http://localhost/auth/web/callback
github.oauth.callback.cli=http://localhost:8765/callback
github.oauth.scope=read:user,user:email

# ????????????????????????????????????????????????????????????????????
# JWT ? FIXED TEST VALUES
# A fixed predictable secret makes token generation deterministic.
# Must be at least 32 characters for HMAC-SHA256.
# This is not a real secret ? test scope only, never deployed.
# ????????????????????????????????????????????????????????????????????

jwt.secret=test-only-secret-key-not-real-minimum-32-chars
jwt.access.token.expiry.seconds=900
jwt.refresh.token.expiry.seconds=604800

# ????????????????????????????????????????????????????????????????????
# LOGGING ? QUIET EXCEPT YOUR OWN CODE
# Framework noise is suppressed to WARN so test output is readable.
# com.insighta stays at DEBUG so your RequestLoggingFilter output
# is captured by OutputCaptureExtension in logging tests.
# ????????????????????????????????????????????????????????????????????

logging.level.root=WARN
logging.level.com.insighta=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.io.github.bucket4j=WARN
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN

# Clean pattern ? no colour codes, easier to read in CI output
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%t] %logger{36} - %msg%n